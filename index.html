<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz From Radi</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121214;
            color: #ffffff;
            text-align: center;
            padding: 20px;
            margin: 0;
        }
        .wadah {
            background-color: #1a1a1e;
            padding: 30px;
            border-radius: 15px;
            max-width: 500px;
            margin: 50px auto;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
        }
        h2 { color: #f39c12; margin-bottom: 10px; }
        .sub-judul { color: #aaa; font-size: 14px; margin-bottom: 20px; }
        input[type="text"] {
            width: 80%;
            padding: 12px;
            margin-bottom: 20px;
            border: 2px solid #333;
            border-radius: 8px;
            background-color: #222;
            color: #fff;
            outline: none;
        }
        input[type="text"]:focus { border-color: #f39c12; }
        .btn {
            background-color: #f39c12;
            color: #fff;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 10px;
            transition: 0.3s;
        }
        .btn:hover { background-color: #e67e22; }
        .btn-center { width: auto; min-width: 150px; }
        #box-kuis { display: none; }
        #pertanyaan { font-size: 18px; margin-bottom: 20px; font-weight: bold; }
    </style>
</head>
<body oncontextmenu="return false;">

    <!-- HALAMAN 1: INPUT NAMA -->
    <div id="halaman-nama" class="wadah">
        <h2>🎮 Quiz From Radi</h2>
        <p class="sub-judul">Platform Kuis Kompetitif</p>
        <input type="text" id="nama" placeholder="Masukkan nama kamu...">
        <button class="btn btn-center" onclick="lanjut()">Lanjut</button>
    </div>

    <!-- HALAMAN 2: PILIH KATEGORI UTAMA -->
    <div class="wadah" id="menu-utama" style="display: none;">
        <h2>Pilih Kategori Utama</h2>
        <p class="sub-judul">Silakan tentukan jenis kuis yang ingin kamu mainkan</p>
        <button class="btn" onclick="pilihMenu('menu-game')">Kategori Game</button>
        <button class="btn" onclick="alert('Kategori Pendidikan belum tersedia!')">Kategori Pendidikan</button>
    </div>

    <!-- HALAMAN 3: PILIH GAME -->
    <div class="wadah" id="menu-game" style="display: none;">
        <h2>Kategori Game</h2>
        <p class="sub-judul">Pilih game yang ingin kamu uji pengetahuannya</p>
        <button class="btn" onclick="siapkanKuis('pubg')">PUBG Mobile</button>
        <button class="btn" onclick="alert('Kuis MLBB sedang dikembangkan!')">Mobile Legends</button>
        <button class="btn" onclick="alert('Kuis Free Fire sedang dikembangkan!')">Free Fire</button>
    </div>

    <!-- HALAMAN 4: AREA KUIS BERJALAN -->
    <div class="wadah" id="box-kuis">
        <h2 id="judul-kuis">Kuis Sedang Berjalan</h2>
        <div id="pertanyaan"></div>
        <div id="opsi-jawaban"></div>
    </div>

    <!-- 🛠️ LOGIKA JAVASCRIPT (TERMASUK SOAL-SOAL MILIK RADI) -->
    <script>
        // Daftar soal PUBG buatan Radi yang diselamatkan dari gambar 313621.png
        const soalPUBG = [
            {q: "Apa nama wilayah kota besar di map Erangel yang terkenal dengan apartemennya?", a: ["Pochinki", "Rozhok", "School", "Yasnaya Polyana"], c: 3},
            {q: "Senjata senapan serbu rifle yang menggunakan peluru 7.62mm dan terkenal paling sakit adalah?", a: ["M416", "AKM", "SCAR-L", "M16A4"], c: 1},
            {q: "Berapa kapasitas total maksimal jika tas level 3 digabungkan dengan rompi?", a: ["350", "400", "450", "500"], c: 1},
            {q: "Apa tingkatan level tertinggi untuk Helm dan Vest di dalam game?", a: ["Level 2", "Level 3", "Level 4", "Level 5"], c: 1},
            {q: "Kalimat kemenangan legendaris saat berhasil memenangkan pertandingan di PUBG adalah?", a: ["Booyah!", "Victory!", "Winner Winner Chicken Dinner!", "Savage!"], c: 2},
            {q: "Jenis item medis kotak besar apa yang bisa memulihkan HP langsung menjadi 100%?", a: ["Med Kit", "First Aid Kit", "Bandage", "Adrenaline Syringe"], c: 0},
            {q: "Senjata Sniper tipe Bolt-Action yang hanya bisa didapatkan dari Air Drop adalah?", a: ["Kar98k", "M24", "AWM", "Win94"], c: 2},
            {q: "Apa fungsi utama dari komponen Kompensator (Compensator) pada senjata?", a: ["Mengurangi suara", "Menghilangkan percikan api", "Mengurangi recoil horizontal dan vertikal", "Menambah slot peluru"], c: 2},
            {q: "Kendaraan roda tiga eksentrik yang ada di map Sanhok dinamakan?", a: ["Dacia", "UAZ", "Tukshai", "Buggy"], c: 2},
            {q: "Senjata api jenis submachine gun (SMG) yang memiliki firing rate tercepat adalah?", a: ["UMP45", "Micro UZI", "Vector", "Tommy Gun"], c: 1},
            {q: "Apa nama lingkaran pembatas energi biru yang terus mengecil seiring berjalannya waktu?", a: ["Safe Zone", "Blue Zone", "Red Zone", "Play Zone"], c: 1},
            {q: "Item melee berwujud Panci memiliki keunikan luar biasa yaitu bisa?", a: ["Memantulkan peluru", "Berlari lebih cepat", "Menghancurkan kendaraan", "Mengisi darah"], c: 0},
            {q: "Komponen Scope keker jarak jauh maksimal yang bisa dipasangkan pada senjata Assault Rifle (AR) adalah?", a: ["4x Scope", "6x Scope", "8x Scope", "15x Scope"], c: 1},
            {q: "Apakah nama map medan perang klasik PUBG yang dipenuhi oleh hamparan gurun pasir?", a: ["Erangel", "Miramar", "Sanhok", "Vikendi"], c: 1},
            {q: "Item suntikan booster apa yang langsung memberikan bar energi penuh sebesar 100%?", a: ["Painkiller", "Energy Drink", "Adrenaline Syringe", "Med Kit"], c: 2}
        ];

        let skor = 0;
        let indeksSoalSekarang = 0;

        // Fungsi berpindah dari halaman input nama ke Menu Utama
        function lanjut() {
            var namaUser = document.getElementById("nama").value;
            if (namaUser.trim() === "") {
                alert("Silakan masukkan nama kamu terlebih dahulu!");
                return;
            }
            document.getElementById("halaman-nama").style.display = "none";
            document.getElementById("menu-utama").style.display = "block";
        }

        // Fungsi memilih kategori utama
        function pilihMenu(idMenu) {
            document.getElementById("menu-utama").style.display = "none";
            document.getElementById(idMenu).style.display = "block";
        }

        // Fungsi memulai kuis berdasarkan game yang dipilih
        function siapkanKuis(kategori) {
            if (kategori === 'pubg') {
                document.getElementById("menu-game").style.display = "none";
                document.getElementById("box-kuis").style.display = "block";
                indeksSoalSekarang = 0;
                skor = 0;
                tampilkanSoal();
            }
        }

        // Fungsi menampilkan soal satu per satu
        function tampilkanSoal() {
            if (indeksSoalSekarang < soalPUBG.length) {
                let dataSoal = soalPUBG[indeksSoalSekarang];
                document.getElementById("pertanyaan").innerText = (indeksSoalSekarang + 1) + ". " + dataSoal.q;
                
                let areaOpsi = document.getElementById("opsi-jawaban");
                areaOpsi.innerHTML = ""; // Bersihkan pilihan sebelumnya
                
                // Membuat tombol untuk setiap pilihan jawaban
                dataSoal.a.forEach((pilihan, indeks) => {
                    let tombolOpsi = document.createElement("button");
                    tombolOpsi.className = "btn";
                    tombolOpsi.innerText = pilihan;
                    tombolOpsi.onclick = function() { cekJawaban(indeks); };
                    areaOpsi.appendChild(tombolOpsi);
                });
            } else {
                // Kuis Selesai
                document.getElementById("pertanyaan").innerText = "Kuis Selesai! 🎉";
                var namaUser = document.getElementById("nama").value;
                document.getElementById("opsi-jawaban").innerHTML = "<h3>Selamat " + namaUser + "!</h3><p>Skor Akhir Kamu: <b>" + skor + " / " + (soalPUBG.length * 10) + "</b></p><button class='btn' onclick='location.reload()'>Main Lagi</button>";
            }
        }

        // Fungsi mengecek jawaban benar atau salah
        function cekJawaban(indeksDipilih) {
            let dataSoal = soalPUBG[indeksSoalSekarang];
            if (indeksDipilih === dataSoal.c) {
                alert("Benar! 🎉");
                skor += 10;
            } else {
                alert("Salah! ❌ Jawaban yang benar adalah: " + dataSoal.a[dataSoal.c]);
            }
            indeksSoalSekarang++;
            tampilkanSoal();
        }
    </script>
</body>
</html>
